services:
  chrelyonly-nacos-app:
    image: nacos/nacos-server:latest
    container_name: chrelyonly-nacos-app
    volumes:
      - /www/dk_project/dk_app/chrelyonly-nacos-app/app:/app
#    working_dir: /app
    dns:
      - 114.114.114.114
      - 1.1.1.1
    networks:
      my-network:
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=ZHdUSmMyRzVnOEtuZlp0d25FVW1vY0t6RVB4Qk1ZNFQ=
      - NACOS_AUTH_IDENTITY_KEY=ZHdUSmMyRzVnOEtuZlp0d25FVW1vY0t6RVB4Qk1ZNFQ=
      - NACOS_AUTH_IDENTITY_VALUE=ZHdUSmMyRzVnOEtuZlp0d25FVW1vY0t6RVB4Qk1ZNFQ=
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    # 运行应用
#    command: ["sh", "-c", "/app/nacos-init.sh"]
#    command: ["sh", "-c", "tail -f /dev/null"]

networks:
  my-network:  # 定义自定义网络
    name: my-network         # 可选：自定义网络名称
    driver: bridge  # 使用默认的 bridge 网络驱动
    ipam: # IP 地址管理配置（IP Address Management）
      driver: default           # 使用默认 IPAM 驱动
      config: # 子网配置（可多个）
        - subnet: 172.20.0.0/16     # 子网网段 172.20.0.1 -- 172.20.255.254
          gateway: 172.20.0.1       # 默认网关
          aux_addresses: # 预留 IP 地址
            host1: 172.20.0.2
            host2: 172.20.0.3
